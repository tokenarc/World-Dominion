name: Set Telegram Webhook
on:
  workflow_dispatch:

jobs:
  set-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Set Webhook
        run: |
          # CONVEX_SITE_URL secret must be set in GitHub repo settings
          # Format: https://peaceful-scorpion-529.convex.site
          curl -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "${{ secrets.CONVEX_SITE_URL }}/telegram",
              "secret_token": "${{ secrets.WEBHOOK_SECRET }}",
              "allowed_updates": ["message", "callback_query"],
              "drop_pending_updates": true
            }'

      - name: Verify Webhook
        run: |
          curl "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/getWebhookInfo"
